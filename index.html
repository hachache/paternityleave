    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Comment se décompose le congé paternité en France ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le congé paternité comprend 3 jours ouvrables à la charge de l'employeur, 4 jours calendaires obligatoires immédiatement après, puis 21 jours calendaires fractionnables (28 en cas de naissances multiples)."
          }
        },
        {
          "@type": "Question",
          "name": "Dans quels délais dois-je prendre les jours fractionnables ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les 21 jours fractionnables doivent être pris dans les 6 mois suivant la naissance (12 mois si le nouveau-né est hospitalisé). Pour une adoption, les jours sont également à poser dans les 6 mois suivant l'arrivée de l'enfant."
          }
        },
        {
          "@type": "Question",
          "name": "Puis-je répartir mes jours de congé paternité ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Le congé fractionnable peut être pris en une ou deux périodes, avec un minimum de 5 jours calendaires consécutifs par période."
          }
        },
        {
          "@type": "Question",
          "name": "Le calculateur couvre-t-il les naissances multiples ou l'adoption ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. L'outil intègre les cas de naissances multiples (+7 jours fractionnables, soit 28 au total), l'hospitalisation du nouveau-né (report possible jusqu'à 12 mois) et l'adoption (21 jours fractionnables à prendre dans les 6 mois)."
          }
        }
      ]
    }
