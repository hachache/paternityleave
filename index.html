    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Comment se décompose le congé paternité en France ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le congé paternité comprend 3 jours ouvrables à la charge de l'employeur, 4 jours calendaires obligatoires immédiatement après, puis 21 jours calendaires fractionnables (28 en cas de naissances multiples)."
          }
        },
        {
          "@type": "Question",
          "name": "Dans quels délais dois-je prendre les jours fractionnables ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les 21 jours fractionnables doivent être pris dans les 6 mois suivant la naissance (12 mois si le nouveau-né est hospitalisé). Pour une adoption, les jours sont également à poser dans les 6 mois suivant l'arrivée de l'enfant."
          }
        },
        {
          "@type": "Question",
          "name": "Puis-je répartir mes jours de congé paternité ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Le congé fractionnable peut être pris en une ou deux périodes, avec un minimum de 5 jours calendaires consécutifs par période."
          }
        },
        {
          "@type": "Question",
          "name": "Le calculateur couvre-t-il les naissances multiples ou l'adoption ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. L'outil intègre les cas de naissances multiples (+7 jours fractionnables, soit 28 au total), l'hospitalisation du nouveau-né (report possible jusqu'à 12 mois) et l'adoption (21 jours fractionnables à prendre dans les 6 mois)."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce que le congé supplémentaire de naissance LFSS 2026 ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Créé par l'article 99-V de la LFSS 2026, ce nouveau congé entre en vigueur le 1er juillet 2026 et concerne les enfants nés ou adoptés à partir du 1er janvier 2026. Chaque parent peut bénéficier de 1 à 2 mois indemnisés (70% du salaire net le premier mois, 60% le second, plafond Sécurité sociale), pris après les congés de maternité, paternité ou adoption. Il est fractionnable en 2 périodes d'un mois et ouvert aux salariés du privé, indépendants, non-salariés agricoles, fonctionnaires et militaires."
          }
        },
        {
          "@type": "Question",
          "name": "Dans quels délais prendre le congé supplémentaire de naissance 2026 ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Les enfants nés ou adoptés entre janvier et juin 2026 ouvrent droit à un congé à prendre jusqu'au 31 mars 2027. Pour les naissances à partir du 1er juillet 2026, le congé doit être pris dans les 9 mois suivant la naissance ou l'arrivée de l'enfant, ce délai étant prolongé lorsque les congés de maternité, paternité ou adoption sont eux-mêmes allongés (naissances multiples par exemple). Le préavis légal auprès de l'employeur est de 1 mois, ramené à 15 jours en cas de succession immédiate au congé de paternité."
          }
        }
      ]
    }
